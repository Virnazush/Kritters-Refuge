    LFootBehind: MobHumanoidAnyMarking
    RFootBehind: MobHumanoidAnyMarking
    LLeg: MobHumanLLeg
    RLeg: MobHumanRLeg
    LFoot: MobHumanLFoot
    RFoot: MobHumanRFoot
    Tail: MobHumanoidAnyMarking # Nyanotrasen - Felinid
